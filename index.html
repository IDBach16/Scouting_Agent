<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <title>Moeller Game Prep Agent</title>
  <link rel="apple-touch-icon" href="moeller-logo.png">
  <link rel="icon" href="moeller-logo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Game Prep">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <img src="moeller-logo.png" alt="Moeller" width="36" height="36" style="object-fit:contain">
        </div>
        <div class="header-text">
          <h1>Moeller Game Prep Agent</h1>
          <p class="subtitle">Ask me anything about our opponents, our hitters, or game strategy</p>
        </div>
      </div>
      <div class="header-right">
        <div id="mode-toggle" class="mode-toggle">
          <button class="mode-btn" data-mode="full">Full Analysis</button>
          <button class="mode-btn active" data-mode="dugout">Dugout</button>
        </div>
        <div id="season-toggle" class="season-toggle">
          <button class="season-btn active" data-season="all">All</button>
          <button class="season-btn" data-season="2024">2024</button>
          <button class="season-btn" data-season="2025">2025</button>
          <button class="season-btn" data-season="2026">2026</button>
        </div>
        <a href="/video.html" class="git-push-btn" title="Video Scout" style="text-decoration:none;display:inline-flex;align-items:center;gap:4px;">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Video
        </a>
        <a href="/reports" class="git-push-btn" title="Pitcher Reports" style="text-decoration:none;display:inline-flex;align-items:center;gap:4px;">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          Reports
        </a>
        <button id="git-push-btn" class="git-push-btn" title="Push to GitHub">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/></svg>
          Push
        </button>
        <div id="data-status" class="status-badge loading">
          <span class="status-dot"></span>
          <span class="status-text">Loading...</span>
        </div>
        <div id="last-updated" style="font-size:10px;color:#888;margin-left:8px;white-space:nowrap;display:none;">
          Updated: <span id="last-updated-text"></span>
        </div>
      </div>
    </header>

    <main id="chat-area">
      <div id="welcome" class="welcome-screen">
        <div class="welcome-icon">
          <svg viewBox="0 0 80 80" width="72" height="72">
            <circle cx="40" cy="40" r="38" fill="none" stroke="#C5A55A" stroke-width="2"/>
            <circle cx="40" cy="40" r="12" fill="none" stroke="#C5A55A" stroke-width="1.5"/>
            <path d="M40 2 C40 2,42 20,40 28" stroke="#C5A55A" stroke-width="1" fill="none"/>
            <path d="M40 78 C40 78,38 60,40 52" stroke="#C5A55A" stroke-width="1" fill="none"/>
            <path d="M2 40 C2 40,20 42,28 40" stroke="#C5A55A" stroke-width="1" fill="none"/>
            <path d="M78 40 C78 40,60 38,52 40" stroke="#C5A55A" stroke-width="1" fill="none"/>
          </svg>
        </div>
        <h2 id="welcome-title">What do you need?</h2>
        <p id="welcome-subtitle">Select a report type to get started</p>

        <!-- STEP 1: Report Type Menu -->
        <div id="menu-step1" class="menu-grid">
          <button class="menu-card" data-type="hitter_report">
            <img class="menu-card-logo" src="moeller-logo.png" alt="M">
            <div class="menu-card-title">Scout a Hitter</div>
            <div class="menu-card-desc">Individual hitter scouting report</div>
          </button>
          <button class="menu-card" data-type="pitcher_report">
            <img class="menu-card-logo" src="moeller-logo.png" alt="M">
            <div class="menu-card-title">Scout a Pitcher</div>
            <div class="menu-card-desc">Individual pitcher scouting report</div>
          </button>
          <button class="menu-card" data-type="team_hitters">
            <img class="menu-card-logo" src="moeller-logo.png" alt="M">
            <div class="menu-card-title">Team Hitters</div>
            <div class="menu-card-desc">Scouting report on a team's lineup</div>
          </button>
          <button class="menu-card" data-type="team_pitchers">
            <img class="menu-card-logo" src="moeller-logo.png" alt="M">
            <div class="menu-card-title">Team Pitchers</div>
            <div class="menu-card-desc">Scouting report on a team's pitching staff</div>
          </button>
          <button class="menu-card" data-type="matchup">
            <img class="menu-card-logo" src="moeller-logo.png" alt="M">
            <div class="menu-card-title">Pitcher vs Hitter</div>
            <div class="menu-card-desc">Head-to-head matchup game plan</div>
          </button>
          <button class="menu-card" data-type="tendencies">
            <img class="menu-card-logo" src="moeller-logo.png" alt="M">
            <div class="menu-card-title">Coaching Tendencies</div>
            <div class="menu-card-desc">Team-level tendency analysis by category</div>
          </button>
          <button class="menu-card menu-card-wide" data-type="direct">
            <img class="menu-card-logo" src="moeller-logo.png" alt="M">
            <div class="menu-card-title">Ask a Question</div>
            <div class="menu-card-desc">Free-form question about any player, team, or strategy</div>
          </button>
        </div>

        <!-- STEP 2: Name/Team Picker (hidden initially) -->
        <div id="menu-step2" class="menu-step2 hidden">
          <button id="menu-back" class="menu-back-btn">&larr; Back</button>
          <h3 id="step2-title" class="step2-title">Select a player</h3>
          <div id="step2-search" class="step2-search">
            <input id="step2-input" type="text" placeholder="Start typing a name..." autocomplete="off"/>
          </div>
          <div id="step2-list" class="step2-list"></div>
        </div>

        <!-- STEP 3: Matchup Perspective Picker (hidden initially) -->
        <div id="menu-step3" class="menu-step3 hidden">
          <button id="step3-back" class="menu-back-btn">&larr; Back</button>
          <h3 id="step3-subtitle" class="step3-subtitle">RHP vs LHH</h3>
          <div class="step3-options">
            <button class="step3-card" data-perspective="hitter">
              <div class="menu-card-title">Hitter's Game Plan</div>
              <div class="menu-card-desc">What the hitter should look for</div>
            </button>
            <button class="step3-card" data-perspective="pitcher">
              <div class="menu-card-title">Pitcher's Game Plan</div>
              <div class="menu-card-desc">How the pitcher should attack</div>
            </button>
          </div>
        </div>

        <!-- STEP: Tendency Category Picker (hidden initially) -->
        <div id="menu-tendency-cats" class="menu-tendency-cats hidden">
          <button id="tendency-cats-back" class="menu-back-btn">&larr; Back</button>
          <h3 class="step2-title">Choose a Category</h3>
          <div id="tendency-cats-grid" class="tendency-cats-grid"></div>
        </div>

        <!-- STEP 2b: Example Prompts for "Ask a Question" (hidden initially) -->
        <div id="menu-prompts" class="menu-prompts hidden">
          <button id="prompts-back" class="menu-back-btn">&larr; Back</button>
          <h3 class="step2-title">Quick Questions</h3>
          <p class="prompts-hint">Tap a question or type your own below</p>
          <div id="prompts-grid" class="prompts-grid"></div>
        </div>
      </div>
      <div id="messages" class="messages"></div>
    </main>

    <footer id="input-area">
      <div id="autocomplete-list" class="autocomplete-list hidden"></div>
      <div class="input-wrapper">
        <textarea id="user-input" placeholder="Ask about an opponent, a hitter, a pitcher, or game strategy..." rows="1"></textarea>
        <button id="send-btn" title="Send" aria-label="Send">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <script src="charts.js"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
